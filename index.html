<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Master 活動道具能量換算器</title>

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #ffffff;
            --bg-soft: #f8fafc;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #f97316;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 18px;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            overflow: hidden;
        }

        body {
            font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.35), transparent 32%),
                radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.28), transparent 30%),
                linear-gradient(135deg, #020617, #0f172a 45%, #111827);
            color: var(--text-main);
            min-height: 100vh;
        }

        .scale-viewport {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .scale-stage {
            width: 1180px;
            transform-origin: top center;
        }

        .page {
            width: 1132px;
            margin: 0 auto;
            padding: 24px 0;
        }

        header {
            color: #fff;
            margin-bottom: 22px;
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr) 220px;
            align-items: center;
            gap: 12px;
        }

        h1 {
            grid-column: 2;
            margin: 0;
            text-align: center;
            font-size: 42px;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .language-switcher {
            grid-column: 3;
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            padding: 8px 12px;
            backdrop-filter: blur(10px);
        }

        .language-switcher label {
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .language-switcher select {
            width: auto;
            min-width: 130px;
            padding: 8px 10px;
            border-radius: 999px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .result-summary {
            margin: 0 0 22px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr 1fr;
            gap: 14px;
        }

        .summary-box {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 18px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.65);
            padding: 18px 20px;
            text-align: center;
        }

        .summary-box.primary {
            background: linear-gradient(135deg, #1d4ed8, #7c3aed);
            color: #fff;
        }

        .summary-label {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 7px;
        }

        .summary-box.primary .summary-label {
            color: #dbeafe;
        }

        .summary-value {
            font-size: 30px;
            font-weight: 900;
            color: #0f172a;
            word-break: break-word;
        }

        .summary-box.primary .summary-value {
            color: #fff;
            font-size: 36px;
        }

        .summary-sub {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .summary-box.primary .summary-sub {
            color: #e0e7ff;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 22px;
            align-items: start;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.65);
            overflow: hidden;
        }

        .card-header {
            padding: 18px 22px;
            background: linear-gradient(135deg, #eff6ff, #fff7ed);
            border-bottom: 1px solid var(--border);
        }

        .card-header h2 {
            margin: 0;
            font-size: 21px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header p {
            margin: 8px 0 0;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .card-body {
            padding: 22px;
        }

        .section-title {
            margin: 26px 0 14px;
            font-size: 18px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        label {
            font-size: 14px;
            font-weight: 700;
            color: #334155;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            line-height: 1.35;
        }

        .item-icon {
            width: 1.35em;
            height: 1.35em;
            object-fit: contain;
            display: inline-block;
            flex: 0 0 auto;
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 13px;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
            background: #fff;
            color: var(--text-main);
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .input-group {
            position: relative;
        }

        .input-group span {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        .input-group input {
            padding-right: 62px;
        }

        .demo-image-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 0 0 18px;
            padding: 12px;
            border: 1px dashed #cbd5e1;
            border-radius: 16px;
            background: #f8fafc;
        }

        .demo-image {
            width: 100%;
            max-width: 360px;
            height: auto;
            display: block;
            border-radius: 14px;
            object-fit: contain;
        }

        .table-wrap {
            overflow-x: auto;
            margin-top: 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #fff;
            min-width: 260px;
        }

        th,
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            white-space: nowrap;
        }

        th {
            background: #eff6ff;
            color: #1e40af;
            font-weight: 900;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .active-row td {
            background: #fff7ed !important;
            color: #9a3412;
            font-weight: 900;
        }

        footer {
            text-align: center;
            color: #cbd5e1;
            padding: 26px 12px 4px;
            font-size: 14px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }
    </style>
</head>

<body>
    <div class="scale-viewport" id="scaleViewport">
        <div class="scale-stage" id="scaleStage">
            <div class="page">
                <header>
                    <div class="language-switcher">
                        <label for="languageSelect" data-i18n="languageLabel">語言</label>
                        <select id="languageSelect" aria-label="Language">
                            <option value="zh-Hant">繁體中文</option>
                            <option value="en">English</option>
                            <option value="vi">Tiếng Việt</option>
                        </select>
                    </div>

                    <h1 data-i18n="appTitle">活動道具能量換算器</h1>
                </header>

                <section class="result-summary">
                    <div class="summary-box primary">
                        <div class="summary-label" data-i18n="playerTotalEnergy">玩家總能量</div>
                        <div class="summary-value" id="totalEnergyText">0</div>
                        <div class="summary-sub" id="totalEnergyDetail">基本 + 額外 + 道具</div>
                    </div>

                    <div class="summary-box">
                        <div class="summary-label" data-i18n="nextGroupTitle">下一週預估分組</div>
                        <div class="summary-value" id="nextGroupText">尚未計算</div>
                        <div class="summary-sub" id="groupDesc">請輸入資料後自動判斷。</div>
                    </div>

                    <div class="summary-box">
                        <div class="summary-label" data-i18n="itemConvertedEnergy">道具換算能量</div>
                        <div class="summary-value" id="itemEnergyText">0</div>
                        <div class="summary-sub">
                            <span data-i18n="basePlusExtraEnergy">基本 + 額外能量</span>：
                            <strong id="baseExtraText">0</strong>
                        </div>
                    </div>
                </section>

                <main class="layout">
                    <section class="card">
                        <div class="card-header">
                            <h2><span>🧮</span><span data-i18n="inputTitle">輸入資料</span></h2>
                            <p data-i18n="inputDesc">先填寫基本能量與額外能量，再輸入你剩下的活動道具數量。</p>
                        </div>

                        <div class="card-body">
                            <h3 class="section-title">
                                <img class="item-icon" src="images/energy.png" alt="Energy">
                                <span data-i18n="baseEnergySection">基礎能量</span>
                            </h3>

                            <div class="demo-image-wrap">
                                <img class="demo-image" src="images/total-energy-demo.png" alt="Base energy demo">
                            </div>

                            <div class="grid">
                                <div class="field">
                                    <label for="baseEnergy">
                                        <span data-i18n="baseEnergy">基本能量</span>
                                        <span class="hint" data-i18n="integerOnly">限整數</span>
                                    </label>
                                    <div class="input-group">
                                        <input id="baseEnergy" type="text" inputmode="numeric" />
                                        <span data-i18n="energyUnit">能量</span>
                                    </div>
                                </div>

                                <div class="field">
                                    <label for="extraEnergy">
                                        <span data-i18n="extraEnergy">額外能量</span>
                                        <span class="hint" data-i18n="integerOnly">限整數</span>
                                    </label>
                                    <div class="input-group">
                                        <input id="extraEnergy" type="text" inputmode="numeric" />
                                        <span data-i18n="energyUnit">能量</span>
                                    </div>
                                </div>
                            </div>

                            <div class="divider"></div>

                            <h3 class="section-title" data-i18n="magicKingdomSection">🏰 魔法王國剩餘能量</h3>

                            <div class="grid-3">
                                <div class="field">
                                    <label for="bronzeKey">
                                        <img class="item-icon" src="images/bronze-key.png" alt="Bronze Key">
                                        <span data-i18n="bronzeKey">銅鑰匙</span> <span class="hint">1:105</span>
                                    </label>
                                    <input id="bronzeKey" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="goldKey">
                                        <img class="item-icon" src="images/gold-key.png" alt="Gold Key">
                                        <span data-i18n="goldKey">金鑰匙</span> <span class="hint">1:220</span>
                                    </label>
                                    <input id="goldKey" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="bluePotion">
                                        <img class="item-icon" src="images/blue-potion.png" alt="Blue Potion">
                                        <span data-i18n="bluePotion">藍色藥水</span> <span class="hint">500:1</span>
                                    </label>
                                    <input id="bluePotion" type="text" inputmode="text" autocomplete="off"
                                        autocapitalize="characters" placeholder="例如：500k 或 1.2M"
                                        data-i18n-placeholder="decimalPlaceholder" />
                                </div>

                                <div class="field">
                                    <label for="redPotion">
                                        <img class="item-icon" src="images/red-potion.png" alt="Red Potion">
                                        <span data-i18n="redPotion">紅色藥水</span> <span class="hint">50000:1</span>
                                    </label>
                                    <input id="redPotion" type="text" inputmode="text" autocomplete="off"
                                        autocapitalize="characters" placeholder="例如：500k 或 1.2M"
                                        data-i18n-placeholder="decimalPlaceholder" />
                                </div>

                                <div class="field">
                                    <label for="bomb">
                                        <img class="item-icon" src="images/bomb.png" alt="Bomb">
                                        <span data-i18n="bomb">炸彈</span> <span class="hint">1:50</span>
                                    </label>
                                    <input id="bomb" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="cannon">
                                        <img class="item-icon" src="images/cannon.png" alt="Cannon">
                                        <span data-i18n="cannon">砲台</span> <span class="hint">1:100</span>
                                    </label>
                                    <input id="cannon" type="text" inputmode="numeric" placeholder="0" />
                                </div>
                            </div>

                            <div class="divider"></div>

                            <h3 class="section-title" data-i18n="normalItemsSection">📌 一般活動道具</h3>

                            <div class="grid-3">
                                <div class="field">
                                    <label for="cookie">
                                        <img class="item-icon" src="images/cookie.png" alt="Cookie">

                                    </label>
                                    <input id="cookie" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="caveKey">
                                        <img class="item-icon" src="images/cave-key.png" alt="Cave Key">
                                        <span data-i18n="caveKey">洞穴鑰匙</span> <span class="hint">1:10</span>
                                    </label>
                                    <input id="caveKey" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="wealthHammer">
                                        <img class="item-icon" src="images/wealth-hammer.png" alt="Wealth Hammer">
                                        <span data-i18n="wealthHammer">財富寶鎚</span> <span class="hint">1:10</span>
                                    </label>
                                    <input id="wealthHammer" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="mergeLightning">
                                        <img class="item-icon" src="images/merge-lightning.png" alt="Merge Lightning">
                                        <span data-i18n="mergeLightning">合併閃電</span> <span class="hint">1:10</span>
                                    </label>
                                    <input id="mergeLightning" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="cosmicCoin">
                                        <img class="item-icon" src="images/cosmic-coin.png" alt="Cosmic Coin">
                                        <span data-i18n="cosmicCoin">宇宙代幣</span> <span class="hint">1:10</span>
                                    </label>
                                    <input id="cosmicCoin" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="shovel">
                                        <img class="item-icon" src="images/shovel.png" alt="Shovel">
                                        <span data-i18n="shovel">鏟子</span> <span class="hint">1:10</span>
                                    </label>
                                    <input id="shovel" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="bossCoin">
                                        <img class="item-icon" src="images/boss-coin.png" alt="Boss Token">
                                        <span data-i18n="bossCoin">Boss 代幣</span> <span class="hint">100:1</span>
                                    </label>
                                    <input id="bossCoin" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="farmCoin">
                                        <img class="item-icon" src="images/farm-coin.png" alt="Farm Coin">
                                        <span data-i18n="farmCoin">耕種花幣</span> <span class="hint">100:1</span>
                                    </label>
                                    <input id="farmCoin" type="text" inputmode="numeric" placeholder="0" />
                                </div>

                                <div class="field">
                                    <label for="avalancheCoin">
                                        <img class="item-icon" src="images/avalanche-coin.png" alt="Avalanche Token">
                                        <span data-i18n="avalancheCoin">雪崩代幣</span> <span class="hint">20:1</span>
                                    </label>
                                    <input id="avalancheCoin" type="text" inputmode="numeric" placeholder="0" />
                                </div>
                            </div>
                        </div>
                    </section>
                </main>

                <section class="card" style="margin-top:22px;">
                    <div class="card-header">
                        <h2><span>🗂️</span><span data-i18n="groupTableTitle">分組內容對照表</span></h2>
                        <p data-i18n="groupTableDesc">表格會標示目前總能量所在列。</p>
                    </div>

                    <div class="card-body">
                        <div class="table-wrap">
                            <table id="groupTable">
                                <thead>
                                    <tr>
                                        <th data-i18n="energyBeforeNewEvent">新活動前所剩能量</th>
                                    </tr>
                                </thead>
                                <tbody id="groupTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <footer id="footerText"></footer>
            </div>
        </div>
    </div>

    <script>
        const DESIGN_WIDTH = 1180;

        function updatePageScale() {
            const scaleViewport = document.getElementById("scaleViewport");
            const scaleStage = document.getElementById("scaleStage");

            if (!scaleViewport || !scaleStage) return;

            scaleStage.style.transform = "scale(1)";

            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;

            const stageWidth = DESIGN_WIDTH;
            const stageHeight = scaleStage.scrollHeight;

            const isMobile = viewportWidth < DESIGN_WIDTH;

            let scale = 1;

            if (isMobile) {
                const scaleX = viewportWidth / stageWidth;
                const scaleY = viewportHeight / stageHeight;
                scale = Math.min(scaleX, scaleY);
            }

            scaleStage.style.transform = `scale(${scale})`;

            if (isMobile) {
                scaleViewport.style.height = "100vh";
                scaleViewport.style.alignItems = "flex-start";
                document.documentElement.style.overflow = "hidden";
                document.body.style.overflow = "hidden";
            } else {
                scaleViewport.style.height = "100vh";
                scaleViewport.style.alignItems = "flex-start";
                document.documentElement.style.overflow = "hidden";
                document.body.style.overflow = "hidden";
            }
        }

                groupTableDesc: "The table highlights the row matching your current total energy.",
                energyBeforeNewEvent: "Energy Before New Event",
                noMatchingGroup: "No matching range",
                totalLabelBase: "Base",
                totalLabelExtra: "Extra",
                totalLabelItems: "Items",
                totalText: total => `Total ${total}. The matching range is highlighted.`,
                currentTotalText: total => `Current total ${total}.`,
                footer: year => `Copyright © ${year} 大佬群＆Coin999-長長久久`
            },
            vi: {
                pageTitle: "Công cụ quy đổi năng lượng vật phẩm Coin Master",
                languageLabel: "Ngôn ngữ",
                appTitle: "Công cụ quy đổi năng lượng vật phẩm sự kiện",
                inputTitle: "Nhập dữ liệu",
                inputDesc: "Nhập năng lượng cơ bản và năng lượng thêm, sau đó nhập số vật phẩm sự kiện còn lại.",
                baseEnergySection: "Năng lượng cơ bản",
                baseEnergy: "Năng lượng cơ bản",
                extraEnergy: "Năng lượng thêm",
                integerOnly: "Chỉ số nguyên",
                energyUnit: "Năng lượng",
                magicKingdomSection: "🏰 Năng lượng còn lại của Vương quốc phép thuật",
                normalItemsSection: "📌 Vật phẩm sự kiện thường",
                bronzeKey: "Chìa khóa đồng",
                goldKey: "Chìa khóa vàng",
                bluePotion: "Thuốc xanh",
                redPotion: "Thuốc đỏ",
                bomb: "Bom",
                cannon: "Pháo",
                cookie: "Bánh quy đường mòn",
                caveKey: "Chìa khóa hang động",
                wealthHammer: "Búa kho báu",
                mergeLightning: "Tia sét hợp nhất",
                cosmicCoin: "Xu vũ trụ",
                shovel: "Xẻng",
                bossCoin: "Xu Boss",
                farmCoin: "Xu nông trại",
                avalancheCoin: "Xu tuyết lở",
                decimalPlaceholder: "Ví dụ: 500k hoặc 1.2M",
                playerTotalEnergy: "Tổng năng lượng người chơi",
                nextGroupTitle: "Nhóm dự kiến tuần sau",
                itemConvertedEnergy: "Năng lượng quy đổi từ vật phẩm",
                basePlusExtraEnergy: "Cơ bản + thêm",
                groupTableTitle: "Bảng đối chiếu nhóm",
                groupTableDesc: "Bảng sẽ đánh dấu dòng tương ứng với tổng năng lượng hiện tại.",
                energyBeforeNewEvent: "Năng lượng còn lại trước sự kiện mới",
                noMatchingGroup: "Không thuộc khoảng nào",
                totalLabelBase: "Cơ bản",
                totalLabelExtra: "Thêm",
                totalLabelItems: "Vật phẩm",
                totalText: total => `Tổng ${total}, bảng đã đánh dấu khoảng tương ứng.`,
                currentTotalText: total => `Tổng hiện tại ${total}.`,
                footer: year => `Copyright © ${year} 大佬群＆Coin999-長長久久`
            }
        };

        let currentLang = localStorage.getItem("calculatorLanguage") || "zh-Hant";

        const groupRows = [
            { rangeLabel: "VIP", min: Infinity, max: Infinity },
            { rangeLabel: "0 - 900", min: 0, max: 900 },
            { rangeLabel: "901 - 4.9K", min: 901, max: 4900 },
            { rangeLabel: "5K - 9.9K", min: 5000, max: 9900 },
            { rangeLabel: "10K - 19.9K", min: 10000, max: 19900 },
            { rangeLabel: "20K - 39.9K", min: 20000, max: 39900 },
            { rangeLabel: "40K - 74.9K", min: 40000, max: 74900 },
            { rangeLabel: "75K - 149K", min: 75000, max: 149000 },
            { rangeLabel: "150K - 299K", min: 150000, max: 299000 },
            { rangeLabel: "300K - 499K", min: 300000, max: 499000 },
            { rangeLabel: "500K - 999K", min: 500000, max: 999000 },
            { rangeLabel: "1M 以上", min: 1000000, max: Infinity }
        ];

        const inputIds = [
            "baseEnergy", "extraEnergy", "bronzeKey", "goldKey", "bluePotion", "redPotion",
            "bomb", "cannon", "cookie", "caveKey", "wealthHammer", "mergeLightning",
            "cosmicCoin", "shovel", "bossCoin", "farmCoin", "avalancheCoin"
        ];

        const decimalAllowedIds = ["bluePotion", "redPotion"];
        const integerOnlyIds = inputIds.filter(id => !decimalAllowedIds.includes(id));

        function t(key) {
            return translations[currentLang][key] || translations["zh-Hant"][key] || key;
        }

        function applyI18n() {
            const dictionary = translations[currentLang] || translations["zh-Hant"];

            document.documentElement.lang = currentLang;
            document.title = dictionary.pageTitle;

            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                if (dictionary[key]) el.textContent = dictionary[key];
            });

            document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
                const key = el.getAttribute("data-i18n-placeholder");
                if (dictionary[key]) el.setAttribute("placeholder", dictionary[key]);
            });

            setFooterYear();
            calculateAll();
            updatePageScale();
        }

        function sanitizeInputValue(value, allowDecimal = false) {
            if (value === null || value === undefined) return "";

            let text = String(value)
                .replace(/,/g, "")
                .replace(/，/g, "")
                .replace(/\s/g, "")
                .toUpperCase();

            if (allowDecimal) {
                text = text.replace(/[^0-9.KM]/g, "");

                const firstKIndex = text.indexOf("K");
                const firstMIndex = text.indexOf("M");

                let suffix = "";

                if (firstKIndex !== -1 && firstMIndex !== -1) {
                    suffix = firstKIndex < firstMIndex ? "K" : "M";
                } else if (firstKIndex !== -1) {
                    suffix = "K";
                } else if (firstMIndex !== -1) {
                    suffix = "M";
                }

                text = text.replace(/[KM]/g, "");

                const parts = text.split(".");
                const integerPart = parts[0] || "";
                const decimalPart = parts.length > 1 ? parts.slice(1).join("") : "";

                text = integerPart;

                if (parts.length > 1) {
                    text += "." + decimalPart;
                }

                if (text === "." || text === "") return "";

                return text + suffix;
            }

            return text.replace(/[^0-9]/g, "");
        }

        function parseNumber(value, allowDecimal = false) {
            let text = sanitizeInputValue(value, allowDecimal).toLowerCase();
            if (!text) return 0;

            let multiplier = 1;

            if (text.endsWith("k")) {
                multiplier = 1000;
                text = text.slice(0, -1);
            } else if (text.endsWith("m")) {
                multiplier = 1000000;
                text = text.slice(0, -1);
            }

            let number = allowDecimal ? parseFloat(text) : parseInt(text, 10);
            if (isNaN(number)) return 0;

            return number * multiplier;
        }

        function getInputNumber(id) {
            const input = document.getElementById(id);
            if (!input) return 0;

            return parseNumber(input.value, decimalAllowedIds.includes(id));
        }

        function formatNumber(num) {
            const value = Math.floor(num || 0);

            const localeMap = {
                "zh-Hant": "zh-TW",
                en: "en-US",
                vi: "vi-VN"
            };

            return value.toLocaleString(localeMap[currentLang] || "zh-TW");
        }

        function calculateItemEnergy() {
            const bronzeKey = getInputNumber("bronzeKey");
            const goldKey = getInputNumber("goldKey");
            const bluePotion = getInputNumber("bluePotion");
            const redPotion = getInputNumber("redPotion");
            const bomb = getInputNumber("bomb");
            const cannon = getInputNumber("cannon");

            const cookie = getInputNumber("cookie");
            const caveKey = getInputNumber("caveKey");
            const wealthHammer = getInputNumber("wealthHammer");
            const mergeLightning = getInputNumber("mergeLightning");
            const cosmicCoin = getInputNumber("cosmicCoin");
            const shovel = getInputNumber("shovel");
            const bossCoin = getInputNumber("bossCoin");
            const farmCoin = getInputNumber("farmCoin");
            const avalancheCoin = getInputNumber("avalancheCoin");

            const magicKingdomEnergy =
                bronzeKey * 105 +
                goldKey * 220 +
                bluePotion / 500 +
                redPotion / 50000 +
                bomb * 50 +
                cannon * 100;

            const normalEventEnergy =
                cookie * 5 +
                caveKey * 10 +
                wealthHammer * 10 +
                mergeLightning * 10 +
                cosmicCoin * 10 +
                shovel * 10 +
                bossCoin / 100 +
                farmCoin / 100 +
                avalancheCoin / 20;

            return magicKingdomEnergy + normalEventEnergy;
        }

        function findGroup(totalEnergy) {
            for (const row of groupRows) {
                if (row.rangeLabel === "VIP") continue;

                if (totalEnergy >= row.min && totalEnergy <= row.max) {
                    return row;
                }
            }

            if (totalEnergy > 999000) {
                return groupRows.find(row => row.rangeLabel === "1M 以上");
            }

            return null;
        }

        function calculateAll() {
            const baseEnergy = getInputNumber("baseEnergy");
            const extraEnergy = getInputNumber("extraEnergy");
            const itemEnergy = Math.floor(calculateItemEnergy());
            const totalEnergy = Math.floor(baseEnergy + extraEnergy + itemEnergy);
            const group = findGroup(totalEnergy);

            document.getElementById("totalEnergyText").textContent = formatNumber(totalEnergy);
            document.getElementById("itemEnergyText").textContent = formatNumber(itemEnergy);
            document.getElementById("baseExtraText").textContent = formatNumber(baseEnergy + extraEnergy);

            document.getElementById("totalEnergyDetail").textContent =
                `${t("totalLabelBase")} ${formatNumber(baseEnergy)} + ` +
                `${t("totalLabelExtra")} ${formatNumber(extraEnergy)} + ` +
                `${t("totalLabelItems")} ${formatNumber(itemEnergy)}`;

            if (group) {
                document.getElementById("nextGroupText").textContent = group.rangeLabel;
                document.getElementById("groupDesc").textContent = t("totalText")(formatNumber(totalEnergy));
            } else {
                document.getElementById("nextGroupText").textContent = t("noMatchingGroup");
                document.getElementById("groupDesc").textContent = t("currentTotalText")(formatNumber(totalEnergy));
            }

            renderGroupTable(group ? group.rangeLabel : null);
            updatePageScale();
        }

        function renderGroupTable(activeRangeLabel = null) {
            const tbody = document.getElementById("groupTableBody");
            tbody.innerHTML = "";

            groupRows.forEach(row => {
                const tr = document.createElement("tr");

                if (activeRangeLabel && row.rangeLabel === activeRangeLabel) {
                    tr.classList.add("active-row");
                }

                tr.innerHTML = `<td>${row.rangeLabel}</td>`;
                tbody.appendChild(tr);
            });

            updatePageScale();
        }

        function bindInputSanitizer() {
            integerOnlyIds.forEach(id => {
                const input = document.getElementById(id);
                if (!input) return;

                input.addEventListener("input", () => {
                    input.value = sanitizeInputValue(input.value, false);
                    calculateAll();
                });

                input.addEventListener("blur", () => {
                    input.value = sanitizeInputValue(input.value, false);
                    calculateAll();
                });
            });

            decimalAllowedIds.forEach(id => {
                const input = document.getElementById(id);
                if (!input) return;

                input.addEventListener("input", () => {
                    input.value = sanitizeInputValue(input.value, true);
                    calculateAll();
                });

                input.addEventListener("blur", () => {
                    input.value = sanitizeInputValue(input.value, true);
                    calculateAll();
                });
            });
        }

        function setFooterYear() {
            const year = new Date().getFullYear();
            document.getElementById("footerText").textContent = t("footer")(year);
        }

        function bindLanguageSwitcher() {
            const languageSelect = document.getElementById("languageSelect");
            languageSelect.value = currentLang;

            languageSelect.addEventListener("change", () => {
                currentLang = languageSelect.value;
                localStorage.setItem("calculatorLanguage", currentLang);
                applyI18n();
                updatePageScale();
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            bindLanguageSwitcher();
            renderGroupTable();
            bindInputSanitizer();
            applyI18n();
            updatePageScale();

            setTimeout(updatePageScale, 100);
            setTimeout(updatePageScale, 300);
            setTimeout(updatePageScale, 700);
        });

        window.addEventListener("resize", () => {
            updatePageScale();
        });

        window.addEventListener("orientationchange", () => {
            setTimeout(updatePageScale, 300);
            setTimeout(updatePageScale, 700);
        });
    </script>
</body>
