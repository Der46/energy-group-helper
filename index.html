<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Master 活動道具能量換算器</title>

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #ffffff;
            --bg-soft: #f8fafc;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #f97316;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #dc2626;
            --radius: 18px;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.35), transparent 32%),
                radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.28), transparent 30%),
                linear-gradient(135deg, #020617, #0f172a 45%, #111827);
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px;
        }

        .page {
            max-width: 1180px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: #fff;
            margin-bottom: 28px;
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 46px);
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
            gap: 22px;
            align-items: start;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.65);
            overflow: hidden;
        }

        .card-header {
            padding: 18px 22px;
            background: linear-gradient(135deg, #eff6ff, #fff7ed);
            border-bottom: 1px solid var(--border);
        }

        .card-header h2 {
            margin: 0;
            font-size: 21px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header p {
            margin: 8px 0 0;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .card-body {
            padding: 22px;
        }

        .section-title {
            margin: 26px 0 14px;
            font-size: 18px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        label {
            font-size: 14px;
            font-weight: 700;
            color: #334155;
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 13px;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
            background: #fff;
            color: var(--text-main);
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .input-group {
            position: relative;
        }

        .input-group span {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        .input-group input {
            padding-right: 48px;
        }

        .result-panel {
            position: sticky;
            top: 20px;
        }

        .total-box {
            background: linear-gradient(135deg, #1d4ed8, #7c3aed);
            color: #fff;
            padding: 24px;
            border-radius: 18px;
            text-align: center;
            margin-bottom: 18px;
            box-shadow: 0 14px 35px rgba(37, 99, 235, 0.35);
        }

        .total-box .label {
            font-size: 14px;
            color: #dbeafe;
            margin-bottom: 8px;
        }

        .total-box .value {
            font-size: clamp(34px, 5vw, 46px);
            font-weight: 900;
            letter-spacing: 1px;
            word-break: break-word;
        }

        .total-box .sub {
            margin-top: 8px;
            color: #e0e7ff;
            font-size: 13px;
            line-height: 1.6;
        }

        .group-box {
            border-radius: 18px;
            padding: 18px;
            background: #f8fafc;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .group-box h3 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .group-name {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent);
            margin: 8px 0;
        }

        .small-list {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .small-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #fff;
            border: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .small-row strong {
            color: #0f172a;
        }

        .notice {
            padding: 14px 15px;
            border-radius: 14px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #9a3412;
            font-size: 14px;
            line-height: 1.7;
        }

        .table-wrap {
            overflow-x: auto;
            margin-top: 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: #fff;
            min-width: 680px;
        }

        th,
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            white-space: nowrap;
        }

        th {
            background: #eff6ff;
            color: #1e40af;
            font-weight: 900;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .active-row td {
            background: #fff7ed !important;
            color: #9a3412;
            font-weight: 900;
        }

        footer {
            text-align: center;
            color: #cbd5e1;
            padding: 26px 12px 4px;
            font-size: 14px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        @media (max-width: 920px) {
            body {
                padding: 16px;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .result-panel {
                position: static;
            }
        }

        @media (max-width: 640px) {

            .grid,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            .card-body {
                padding: 18px;
            }

            .card-header {
                padding: 16px 18px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <h1>活動道具能量換算器</h1>
        </header>

        <main class="layout">
            <section class="card">
                <div class="card-header">
                    <h2>🧮 輸入資料</h2>
                    <p>先填寫基本能量與額外能量，再輸入你剩下的活動道具數量。</p>
                </div>

                <div class="card-body">
                    <h3 class="section-title">⚡ 基礎能量</h3>

                    <div class="grid">
                        <div class="field">
                            <label for="baseEnergy">基本能量 <span class="hint">限整數</span></label>
                            <div class="input-group">
                                <input id="baseEnergy" type="text" inputmode="numeric" />
                                <span>能量</span>
                            </div>
                        </div>

                        <div class="field">
                            <label for="extraEnergy">額外能量 <span class="hint">限整數</span></label>
                            <div class="input-group">
                                <input id="extraEnergy" type="text" inputmode="numeric" />
                                <span>能量</span>
                            </div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <h3 class="section-title">🏰 魔法王國剩餘能量</h3>

                    <div class="grid-3">
                        <div class="field">
                            <label for="bronzeKey">🔑 銅鑰匙 <span class="hint">1:105</span></label>
                            <input id="bronzeKey" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="goldKey">🔑 金鑰匙 <span class="hint">1:220</span></label>
                            <input id="goldKey" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="bluePotion">🧪 藍色藥水 <span class="hint">500:1</span></label>
                            <input id="bluePotion" type="text" inputmode="decimal" placeholder="例如：500k 或 1.2M" />
                        </div>

                        <div class="field">
                            <label for="redPotion">🧪 紅色藥水 <span class="hint">50000:1</span></label>
                            <input id="redPotion" type="text" inputmode="decimal" placeholder="例如：500k 或 1.2M" />
                        </div>

                        <div class="field">
                            <label for="bomb">💣 炸彈 <span class="hint">1:50</span></label>
                            <input id="bomb" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="cannon">🔫 砲台 <span class="hint">1:100</span></label>
                            <input id="cannon" type="text" inputmode="numeric" placeholder="0" />
                        </div>
                    </div>

                    <div class="divider"></div>

                    <h3 class="section-title">📌 一般活動道具</h3>

                    <div class="grid-3">
                        <div class="field">
                            <label for="cookie">🍪 小徑餅乾 <span class="hint">1:5</span></label>
                            <input id="cookie" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="caveKey">🦴 洞穴鑰匙 <span class="hint">1:10</span></label>
                            <input id="caveKey" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="wealthHammer">🔨 財富寶鎚 <span class="hint">1:10</span></label>
                            <input id="wealthHammer" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="mergeLightning">⚡ 合併閃電 <span class="hint">1:10</span></label>
                            <input id="mergeLightning" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="wizardStaff">🪄 魔法師法杖 <span class="hint">1:10</span></label>
                            <input id="wizardStaff" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="shovel">🪏 鏟子 <span class="hint">1:10</span></label>
                            <input id="shovel" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="bossCoin">🪙 Boss 代幣 <span class="hint">100:1</span></label>
                            <input id="bossCoin" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="farmCoin">🌸 耕種花幣 <span class="hint">100:1</span></label>
                            <input id="farmCoin" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="avalancheCoin">❄️ 雪崩代幣 <span class="hint">20:1</span></label>
                            <input id="avalancheCoin" type="text" inputmode="numeric" placeholder="0" />
                        </div>
                    </div>
                </div>
            </section>

            <aside class="card result-panel">
                <div class="card-header">
                    <h2>📣 換算結果</h2>
                    <p>結果計算對照下一週分組。</p>
                </div>

                <div class="card-body">
                    <div class="total-box">
                        <div class="label">玩家總能量</div>
                        <div class="value" id="totalEnergyText">0</div>
                        <div class="sub" id="totalEnergyDetail">基準能量 + 額外能量 + 道具換算能量</div>
                    </div>

                    <div class="group-box">
                        <h3>下一週預估分組</h3>
                        <div class="group-name" id="nextGroupText">尚未計算</div>
                        <div id="groupDesc" class="notice">
                            請輸入能量或道具數量後，系統會依照總能量判斷所在分組。
                        </div>

                        <div class="small-list">
                            <div class="small-row">
                                <span>道具換算能量</span>
                                <strong id="itemEnergyText">0</strong>
                            </div>
                            <div class="small-row">
                                <span>基本 + 額外能量</span>
                                <strong id="baseExtraText">0</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <section class="card" style="margin-top:22px;">
            <div class="card-header">
                <h2>🗂️ 分組內容對照表</h2>
                <p>表格會標示目前總能量所在列。</p>
            </div>

            <div class="card-body">
                <div class="table-wrap">
                    <table id="groupTable">
                        <thead>
                            <tr>
                                <th>新活動前所剩能量</th>
                                <th>符號1210</th>
                                <th>1210+3</th>
                                <th>豬豬145</th>
                                <th>符槌槌不計</th>
                            </tr>
                        </thead>
                        <tbody id="groupTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <footer id="footerText"></footer>
    </div>

    <script>
        const groupRows = [
            {
                rangeLabel: "VIP",
                min: Infinity,
                max: Infinity,
                symbol1210: "3M",
                type1210Plus3: "1.2M",
                pig145: "1.2M",
                hammerNoCount: "1.2M"
            },
            {
                rangeLabel: "0 - 900",
                min: 0,
                max: 900,
                symbol1210: "550K",
                type1210Plus3: "300K",
                pig145: "350K",
                hammerNoCount: "300K"
            },
            {
                rangeLabel: "1K - 4.9K",
                min: 1000,
                max: 4900,
                symbol1210: "420K",
                type1210Plus3: "360K",
                pig145: "420K",
                hammerNoCount: "360K"
            },
            {
                rangeLabel: "5K - 9.9K",
                min: 5000,
                max: 9900,
                symbol1210: "600K",
                type1210Plus3: "400K",
                pig145: "435K",
                hammerNoCount: "400K"
            },
            {
                rangeLabel: "10K - 19.9K",
                min: 10000,
                max: 19900,
                symbol1210: "960K",
                type1210Plus3: "560K",
                pig145: "610K",
                hammerNoCount: "560K"
            },
            {
                rangeLabel: "20K - 39.9K",
                min: 20000,
                max: 39900,
                symbol1210: "800K",
                type1210Plus3: "500K",
                pig145: "540K",
                hammerNoCount: "500K"
            },
            {
                rangeLabel: "40K - 74.9K",
                min: 40000,
                max: 74900,
                symbol1210: "1.2M",
                type1210Plus3: "800K",
                pig145: "865K",
                hammerNoCount: "800K"
            },
            {
                rangeLabel: "75K - 149K",
                min: 75000,
                max: 149000,
                symbol1210: "1.5M",
                type1210Plus3: "850K",
                pig145: "920K",
                hammerNoCount: "850K"
            },
            {
                rangeLabel: "150K - 299K",
                min: 150000,
                max: 299000,
                symbol1210: "2M",
                type1210Plus3: "1.3M",
                pig145: "1.4M",
                hammerNoCount: "1.3M"
            },
            {
                rangeLabel: "300K - 499K",
                min: 300000,
                max: 499000,
                symbol1210: "3.4M",
                type1210Plus3: "2.1M",
                pig145: "2.3M",
                hammerNoCount: "2.1M"
            },
            {
                rangeLabel: "500K - 999K",
                min: 500000,
                max: 999000,
                symbol1210: "4.8M-1",
                type1210Plus3: "3M-1",
                pig145: "3.2M-1",
                hammerNoCount: "3M-1"
            },
            {
                rangeLabel: "1M 以上",
                min: 1000000,
                max: Infinity,
                symbol1210: "4.8M-2",
                type1210Plus3: "3M-2",
                pig145: "3.2M-2",
                hammerNoCount: "3M-2"
            }
        ];

        const inputIds = [
            "baseEnergy",
            "extraEnergy",
            "bronzeKey",
            "goldKey",
            "bluePotion",
            "redPotion",
            "bomb",
            "cannon",
            "cookie",
            "caveKey",
            "wealthHammer",
            "mergeLightning",
            "wizardStaff",
            "shovel",
            "bossCoin",
            "farmCoin",
            "avalancheCoin"
        ];

        const decimalAllowedIds = [
            "bluePotion",
            "redPotion"
        ];

        const integerOnlyIds = inputIds.filter(id => !decimalAllowedIds.includes(id));

        function sanitizeInputValue(value, allowDecimal = false) {
            if (value === null || value === undefined) return "";

            let text = String(value)
                .replace(/,/g, "")
                .replace(/，/g, "")
                .replace(/\s/g, "")
                .toUpperCase();

            text = text.replace(/[^0-9.KM萬]/g, "");

            const hasK = text.includes("K");
            const hasM = text.includes("M");
            const hasWan = text.includes("萬");

            let suffix = "";

            if (hasK) suffix = "K";
            else if (hasM) suffix = "M";
            else if (hasWan) suffix = "萬";

            text = text.replace(/[KM萬]/g, "");

            if (allowDecimal) {
                const parts = text.split(".");
                const integerPart = parts[0] || "";
                const decimalPart = parts.length > 1 ? parts.slice(1).join("") : "";

                text = integerPart;

                if (parts.length > 1) {
                    text += "." + decimalPart;
                }
            } else {
                text = text.replace(/\./g, "");
            }

            if (text === "." || text === "") {
                return "";
            }

            return text + suffix;
        }

        function parseNumber(value, allowDecimal = false) {
            if (value === null || value === undefined) return 0;

            let text = sanitizeInputValue(value, allowDecimal).toLowerCase();

            if (!text) return 0;

            let multiplier = 1;

            if (text.endsWith("k")) {
                multiplier = 1000;
                text = text.slice(0, -1);
            } else if (text.endsWith("m")) {
                multiplier = 1000000;
                text = text.slice(0, -1);
            } else if (text.endsWith("萬")) {
                multiplier = 10000;
                text = text.slice(0, -1);
            }

            let number = allowDecimal ? parseFloat(text) : parseInt(text, 10);

            if (isNaN(number)) return 0;

            if (!allowDecimal) {
                number = Math.floor(number);
            }

            return number * multiplier;
        }

        function getInputNumber(id) {
            const allowDecimal = decimalAllowedIds.includes(id);
            return parseNumber(document.getElementById(id).value, allowDecimal);
        }

        function formatNumber(num) {
            if (!isFinite(num)) return "∞";

            const value = Math.floor(num);

            return value.toLocaleString("zh-TW");
        }

        function getRoundedEnergy(value) {
            return Math.floor(value);
        }

        function calculateItemEnergy() {
            const bronzeKey = getInputNumber("bronzeKey");
            const goldKey = getInputNumber("goldKey");
            const bluePotion = getInputNumber("bluePotion");
            const redPotion = getInputNumber("redPotion");
            const bomb = getInputNumber("bomb");
            const cannon = getInputNumber("cannon");

            const cookie = getInputNumber("cookie");
            const caveKey = getInputNumber("caveKey");
            const wealthHammer = getInputNumber("wealthHammer");
            const mergeLightning = getInputNumber("mergeLightning");
            const wizardStaff = getInputNumber("wizardStaff");
            const shovel = getInputNumber("shovel");
            const bossCoin = getInputNumber("bossCoin");
            const farmCoin = getInputNumber("farmCoin");
            const avalancheCoin = getInputNumber("avalancheCoin");

            const magicKingdomEnergy =
                bronzeKey * 105 +
                goldKey * 220 +
                bluePotion / 500 +
                redPotion / 50000 +
                bomb * 50 +
                cannon * 100;

            const normalEventEnergy =
                cookie * 5 +
                caveKey * 10 +
                wealthHammer * 10 +
                mergeLightning * 10 +
                wizardStaff * 10 +
                shovel * 10 +
                bossCoin / 100 +
                farmCoin / 100 +
                avalancheCoin / 20;

            return {
                magicKingdomEnergy,
                normalEventEnergy,
                totalItemEnergy: magicKingdomEnergy + normalEventEnergy
            };
        }

        function findGroup(totalEnergy) {
            for (const row of groupRows) {
                if (row.rangeLabel === "VIP") continue;

                if (totalEnergy >= row.min && totalEnergy <= row.max) {
                    return row;
                }
            }

            if (totalEnergy > 999000) {
                return groupRows.find(row => row.rangeLabel === "1M 以上");
            }

            return null;
        }

        function calculateAll() {
            const baseEnergy = getInputNumber("baseEnergy");
            const extraEnergy = getInputNumber("extraEnergy");

            const itemData = calculateItemEnergy();

            const rawTotal = baseEnergy + extraEnergy + itemData.totalItemEnergy;
            const totalEnergy = getRoundedEnergy(rawTotal);

            const group = findGroup(totalEnergy);

            document.getElementById("totalEnergyText").textContent = formatNumber(totalEnergy);
            document.getElementById("itemEnergyText").textContent = formatNumber(getRoundedEnergy(itemData.totalItemEnergy));
            document.getElementById("baseExtraText").textContent = formatNumber(getRoundedEnergy(baseEnergy + extraEnergy));

            document.getElementById("totalEnergyDetail").textContent =
                `基本 ${formatNumber(baseEnergy)} + 額外 ${formatNumber(extraEnergy)} + 道具 ${formatNumber(getRoundedEnergy(itemData.totalItemEnergy))}`;

            if (group) {
                document.getElementById("nextGroupText").textContent = group.rangeLabel;
                document.getElementById("groupDesc").innerHTML =
                    `你的新活動前所剩能量為 <strong>${formatNumber(totalEnergy)}</strong>，` +
                    `預估會落在 <strong>${group.rangeLabel}</strong> 這一組。<br>` +
                    `下方表格已標示目前所在區間，可直接對照各活動組別需求。`;
            } else {
                document.getElementById("nextGroupText").textContent = "未落入表格區間";
                document.getElementById("groupDesc").innerHTML =
                    `目前總能量為 <strong>${formatNumber(totalEnergy)}</strong>，沒有對應到表格中的明確區間。`;
            }

            renderGroupTable(group ? group.rangeLabel : null);
        }

        function renderGroupTable(activeRangeLabel = null) {
            const tbody = document.getElementById("groupTableBody");
            tbody.innerHTML = "";

            groupRows.forEach(row => {
                const tr = document.createElement("tr");

                if (activeRangeLabel && row.rangeLabel === activeRangeLabel) {
                    tr.classList.add("active-row");
                }

                tr.innerHTML = `
                    <td>${row.rangeLabel}</td>
                    <td>${row.symbol1210}</td>
                    <td>${row.type1210Plus3}</td>
                    <td>${row.pig145}</td>
                    <td>${row.hammerNoCount}</td>
                `;

                tbody.appendChild(tr);
            });
        }

        function bindInputSanitizer() {
            integerOnlyIds.forEach(id => {
                const input = document.getElementById(id);

                input.addEventListener("input", () => {
                    const cleanValue = sanitizeInputValue(input.value, false);

                    if (input.value !== cleanValue) {
                        input.value = cleanValue;
                    }

                    calculateAll();
                });

                input.addEventListener("blur", () => {
                    input.value = sanitizeInputValue(input.value, false);
                    calculateAll();
                });
            });

            decimalAllowedIds.forEach(id => {
                const input = document.getElementById(id);

                input.addEventListener("input", () => {
                    const cleanValue = sanitizeInputValue(input.value, true);

                    if (input.value !== cleanValue) {
                        input.value = cleanValue;
                    }

                    calculateAll();
                });

                input.addEventListener("blur", () => {
                    input.value = sanitizeInputValue(input.value, true);
                    calculateAll();
                });
            });
        }

        function setFooterYear() {
            const year = new Date().getFullYear();
            document.getElementById("footerText").textContent =
                `Copyright © ${year} 大佬群＆Coin999-長長久久`;
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderGroupTable();
            bindInputSanitizer();
            setFooterYear();
            calculateAll();
        });
    </script>
</body>

</html>
