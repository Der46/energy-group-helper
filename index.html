<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Master 活動道具能量換算器</title>

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #ffffff;
            --bg-soft: #f8fafc;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #f97316;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #dc2626;
            --radius: 18px;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.35), transparent 32%),
                radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.28), transparent 30%),
                linear-gradient(135deg, #020617, #0f172a 45%, #111827);
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px;
        }

        .page {
            max-width: 1180px;
            margin: 0 auto;
        }

        header {
            color: #fff;
            margin-bottom: 28px;
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr) 220px;
            align-items: center;
            gap: 12px;
        }

        h1 {
            grid-column: 2;
            margin: 0;
            text-align: center;
            font-size: clamp(28px, 3.4vw, 42px);
            letter-spacing: 1px;
            line-height: 1.2;
            min-width: 0;
        }

        .language-switcher {
            grid-column: 3;
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            padding: 8px 12px;
            backdrop-filter: blur(10px);
        }

        .language-switcher label {
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .language-switcher select {
            width: auto;
            min-width: 130px;
            padding: 8px 10px;
            border-radius: 999px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
            gap: 22px;
            align-items: start;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.65);
            overflow: hidden;
        }

        .card-header {
            padding: 18px 22px;
            background: linear-gradient(135deg, #eff6ff, #fff7ed);
            border-bottom: 1px solid var(--border);
        }

        .card-header h2 {
            margin: 0;
            font-size: 21px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header p {
            margin: 8px 0 0;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .card-body {
            padding: 22px;
        }

        .section-title {
            margin: 26px 0 14px;
            font-size: 18px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            min-width: 0;
        }

        label {
            font-size: 14px;
            font-weight: 700;
            color: #334155;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            line-height: 1.35;
        }

        .item-icon {
            width: 1.35em;
            height: 1.35em;
            object-fit: contain;
            display: inline-block;
            flex: 0 0 auto;
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 13px;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
            background: #fff;
            color: var(--text-main);
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        .input-group {
            position: relative;
        }

        .input-group span {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        .input-group input {
            padding-right: 62px;
        }

        .demo-image-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 0 0 18px;
            padding: 12px;
            border: 1px dashed #cbd5e1;
            border-radius: 16px;
            background: #f8fafc;
        }

        .demo-image {
            width: 100%;
            max-width: 360px;
            height: auto;
            display: block;
            border-radius: 14px;
            object-fit: contain;
        }

        .result-panel {
            position: sticky;
            top: 20px;
        }

        .total-box {
            background: linear-gradient(135deg, #1d4ed8, #7c3aed);
            color: #fff;
            padding: 24px;
            border-radius: 18px;
            text-align: center;
            margin-bottom: 18px;
            box-shadow: 0 14px 35px rgba(37, 99, 235, 0.35);
        }

        .total-box .label {
            font-size: 14px;
            color: #dbeafe;
            margin-bottom: 8px;
            display: block;
        }

        .total-box .value {
            font-size: clamp(34px, 5vw, 46px);
            font-weight: 900;
            letter-spacing: 1px;
            word-break: break-word;
        }

        .total-box .sub {
            margin-top: 8px;
            color: #e0e7ff;
            font-size: 13px;
            line-height: 1.6;
        }

        .group-box {
            border-radius: 18px;
            padding: 18px;
            background: #f8fafc;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .group-box h3 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .group-name {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent);
            margin: 8px 0;
        }

        .small-list {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .small-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #fff;
            border: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .small-row strong {
            color: #0f172a;
        }

        .notice {
            padding: 14px 15px;
            border-radius: 14px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #9a3412;
            font-size: 14px;
            line-height: 1.7;
        }

        .table-wrap {
            overflow-x: auto;
            margin-top: 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #fff;
            min-width: 260px;
        }

        th,
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            white-space: nowrap;
        }

        th {
            background: #eff6ff;
            color: #1e40af;
            font-weight: 900;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .active-row td {
            background: #fff7ed !important;
            color: #9a3412;
            font-weight: 900;
        }

        footer {
            text-align: center;
            color: #cbd5e1;
            padding: 26px 12px 4px;
            font-size: 14px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* 手機版調整：結果上移、隱藏基礎能量、道具區塊 2 欄顯示 */
        @media (max-width: 920px) {
            body {
                padding: 14px;
                overflow-x: hidden;
            }

            .page {
                max-width: 100%;
                width: 100%;
            }

            header {
                display: flex;
                flex-direction: column;
                gap: 14px;
                text-align: center;
                margin-bottom: 18px;
            }

            h1 {
                font-size: clamp(26px, 7vw, 38px);
            }

            .language-switcher {
                justify-self: auto;
                order: -1;
            }

            .layout {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .result-panel {
                position: static;
                order: -1;
            }

            .input-card {
                order: 1;
            }

            .base-energy-block {
                display: block;
            }

            .base-energy-block .divider {
                display: none;
            }

            .card-header {
                padding: 15px 16px;
            }

            .card-header h2 {
                font-size: 19px;
            }

            .card-header p {
                font-size: 13px;
                line-height: 1.5;
            }

            .card-body {
                padding: 16px;
            }

            .section-title {
                font-size: 17px;
                margin: 20px 0 12px;
            }

            .grid-3 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
            }

            .field {
                gap: 6px;
            }

            label {
                font-size: 12px;
                line-height: 1.25;
                gap: 3px;
            }

            .hint {
                font-size: 11px;
            }

            .item-icon {
                width: 1.2em;
                height: 1.2em;
            }

            input,
            select {
                font-size: 16px;
                padding: 10px 10px;
                border-radius: 10px;
            }

            .total-box {
                padding: 18px;
                margin-bottom: 12px;
            }

            .total-box .value {
                font-size: 34px;
            }

            .total-box .sub {
                font-size: 12px;
                line-height: 1.45;
            }

            .group-box {
                padding: 14px;
                margin-bottom: 0;
            }

            .group-box h3 {
                font-size: 16px;
                margin-bottom: 8px;
            }

            .group-name {
                font-size: 24px;
                margin: 6px 0;
            }

            .notice {
                padding: 11px 12px;
                font-size: 12px;
                line-height: 1.55;
            }

            .small-list {
                gap: 7px;
                margin-top: 10px;
            }

            .small-row {
                padding: 9px 10px;
                font-size: 12px;
            }

            .table-wrap {
                max-width: 100%;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
            }

            header {
                margin-bottom: 14px;
            }

            h1 {
                font-size: clamp(24px, 7vw, 34px);
            }

            .language-switcher {
                padding: 7px 10px;
            }

            .language-switcher label {
                font-size: 12px;
            }

            .language-switcher select {
                min-width: 120px;
                font-size: 12px;
                padding: 7px 9px;
            }

            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .grid-3 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 9px;
            }

            .card {
                border-radius: 15px;
            }

            .card-header {
                padding: 14px;
            }

            .card-body {
                padding: 14px;
            }

            .divider {
                margin: 18px 0;
            }

            input,
            select {
                font-size: 16px;
                padding: 9px 9px;
            }

            .total-box {
                border-radius: 15px;
                padding: 16px;
            }

            .group-box {
                border-radius: 15px;
            }

            .demo-image {
                max-width: 260px;
            }

            .table-wrap {
                overflow-x: hidden;
            }

            table {
                min-width: 0;
                font-size: 13px;
            }

            th,
            td {
                padding: 10px 8px;
            }
        }

        @media (max-width: 380px) {
            body {
                padding: 8px;
            }

            .grid-3 {
                gap: 8px;
            }

            label {
                font-size: 11.5px;
            }

            .hint {
                font-size: 10.5px;
            }

            input,
            select {
                font-size: 16px;
                padding: 8px;
            }

            .total-box .value {
                font-size: 30px;
            }

            .group-name {
                font-size: 22px;
            }

            .small-row {
                font-size: 11.5px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <div class="language-switcher">
                <label for="languageSelect" data-i18n="languageLabel">語言</label>
                <select id="languageSelect" aria-label="Language">
                    <option value="zh-Hant">繁體中文</option>
                    <option value="en">English</option>
                    <option value="vi">Tiếng Việt</option>
                </select>
            </div>

            <h1 data-i18n="appTitle">活動道具能量換算器</h1>
        </header>

        <main class="layout">
            <section class="card input-card">
                <div class="card-header">
                    <h2><span>🧮</span><span data-i18n="inputTitle">輸入資料</span></h2>
                    <p data-i18n="inputDesc">先填寫基本能量與額外能量，再輸入你剩下的活動道具數量。</p>
                </div>

                <div class="card-body">
                    <h3 class="section-title" data-i18n="magicKingdomSection">🏰 魔法王國剩餘能量</h3>

                    <div class="grid-3">
                        <div class="field">
                            <label for="bronzeKey">
                                <img class="item-icon" src="images/bronze-key.png" alt="Bronze Key">
                                <span data-i18n="bronzeKey">銅鑰匙</span> <span class="hint">1:105</span>
                            </label>
                            <input id="bronzeKey" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="goldKey">
                                <img class="item-icon" src="images/gold-key.png" alt="Gold Key">
                                <span data-i18n="goldKey">金鑰匙</span> <span class="hint">1:220</span>
                            </label>
                            <input id="goldKey" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="bluePotion">
                                <img class="item-icon" src="images/blue-potion.png" alt="Blue Potion">
                                <span data-i18n="bluePotion">藍色藥水</span> <span class="hint">500:1</span>
                            </label>
                            <input id="bluePotion" type="text" inputmode="decimal" placeholder="例如：500k 或 1.2M"
                                data-i18n-placeholder="decimalPlaceholder" />
                        </div>

                        <div class="field">
                            <label for="redPotion">
                                <img class="item-icon" src="images/red-potion.png" alt="Red Potion">
                                <span data-i18n="redPotion">紅色藥水</span> <span class="hint">50000:1</span>
                            </label>
                            <input id="redPotion" type="text" inputmode="decimal" placeholder="例如：500k 或 1.2M"
                                data-i18n-placeholder="decimalPlaceholder" />
                        </div>

                        <div class="field">
                            <label for="bomb">
                                <img class="item-icon" src="images/bomb.png" alt="Bomb">
                                <span data-i18n="bomb">炸彈</span> <span class="hint">1:50</span>
                            </label>
                            <input id="bomb" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="cannon">
                                <img class="item-icon" src="images/cannon.png" alt="Cannon">
                                <span data-i18n="cannon">砲台</span> <span class="hint">1:100</span>
                            </label>
                            <input id="cannon" type="text" inputmode="numeric" placeholder="0" />
                        </div>
                    </div>

                    <div class="divider"></div>

                    <h3 class="section-title" data-i18n="normalItemsSection">📌 一般活動道具</h3>

                    <div class="grid-3">
                        <div class="field">
                            <label for="cookie">
                                <img class="item-icon" src="images/cookie.png" alt="Cookie">
                                <span data-i18n="cookie">小徑餅乾</span> <span class="hint">1:5</span>
                            </label>
                            <input id="cookie" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="caveKey">
                                <img class="item-icon" src="images/cave-key.png" alt="Cave Key">
                                <span data-i18n="caveKey">洞穴鑰匙</span> <span class="hint">1:10</span>
                            </label>
                            <input id="caveKey" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="wealthHammer">
                                <img class="item-icon" src="images/wealth-hammer.png" alt="Wealth Hammer">
                                <span data-i18n="wealthHammer">財富寶鎚</span> <span class="hint">1:10</span>
                            </label>
                            <input id="wealthHammer" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="mergeLightning">
                                <img class="item-icon" src="images/merge-lightning.png" alt="Merge Lightning">
                                <span data-i18n="mergeLightning">合併閃電</span> <span class="hint">1:10</span>
                            </label>
                            <input id="mergeLightning" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="cosmicCoin">
                                <img class="item-icon" src="images/cosmic-coin.png" alt="Cosmic Coin">
                                <span data-i18n="cosmicCoin">宇宙代幣</span> <span class="hint">1:10</span>
                            </label>
                            <input id="cosmicCoin" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="shovel">
                                <img class="item-icon" src="images/shovel.png" alt="Shovel">
                                <span data-i18n="shovel">鏟子</span> <span class="hint">1:10</span>
                            </label>
                            <input id="shovel" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="bossCoin">
                                <img class="item-icon" src="images/boss-coin.png" alt="Boss Token">
                                <span data-i18n="bossCoin">Boss 代幣</span> <span class="hint">100:1</span>
                            </label>
                            <input id="bossCoin" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="farmCoin">
                                <img class="item-icon" src="images/farm-coin.png" alt="Farm Coin">
                                <span data-i18n="farmCoin">耕種花幣</span> <span class="hint">100:1</span>
                            </label>
                            <input id="farmCoin" type="text" inputmode="numeric" placeholder="0" />
                        </div>

                        <div class="field">
                            <label for="avalancheCoin">
                                <img class="item-icon" src="images/avalanche-coin.png" alt="Avalanche Token">
                                <span data-i18n="avalancheCoin">雪崩代幣</span> <span class="hint">20:1</span>
                            </label>
                            <input id="avalancheCoin" type="text" inputmode="numeric" placeholder="0" />
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="base-energy-block">
                        <h3 class="section-title">
                            <img class="item-icon" src="images/energy.png" alt="Energy">
                            <span data-i18n="baseEnergySection">基礎能量</span>
                        </h3>

                        <div class="demo-image-wrap">
                            <img class="demo-image" src="images/total-energy-demo.png" alt="Base energy demo">
                        </div>

                        <div class="grid">
                            <div class="field">
                                <label for="baseEnergy">
                                    <span data-i18n="baseEnergy">基本能量</span>
                                    <span class="hint" data-i18n="integerOnly">限整數</span>
                                </label>
                                <div class="input-group">
                                    <input id="baseEnergy" type="text" inputmode="numeric" />
                                    <span data-i18n="energyUnit">能量</span>
                                </div>
                            </div>

                            <div class="field">
                                <label for="extraEnergy">
                                    <span data-i18n="extraEnergy">額外能量</span>
                                    <span class="hint" data-i18n="integerOnly">限整數</span>
                                </label>
                                <div class="input-group">
                                    <input id="extraEnergy" type="text" inputmode="numeric" />
                                    <span data-i18n="energyUnit">能量</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </section>

            <aside class="card result-panel">
                <div class="card-header">
                    <h2><span>📣</span><span data-i18n="resultTitle">換算結果</span></h2>
                    <p data-i18n="resultDesc">結果計算對照下一週分組。</p>
                </div>

                <div class="card-body">
                    <div class="total-box">
                        <div class="label" data-i18n="playerTotalEnergy">玩家總能量</div>
                        <div class="value" id="totalEnergyText">0</div>
                        <div class="sub" id="totalEnergyDetail">基準能量 + 額外能量 + 道具換算能量</div>
                    </div>

                    <div class="group-box">
                        <h3 data-i18n="nextGroupTitle">下一週預估分組</h3>
                        <div class="group-name" id="nextGroupText">尚未計算</div>
                        <div id="groupDesc" class="notice">
                            請輸入能量或道具數量後，系統會依照總能量判斷所在分組。
                        </div>

                        <div class="small-list">
                            <div class="small-row">
                                <span data-i18n="itemConvertedEnergy">道具換算能量</span>
                                <strong id="itemEnergyText">0</strong>
                            </div>
                            <div class="small-row">

                basePlusExtraEnergy: "Cơ bản + thêm",

                groupTableDesc: "Bảng sẽ đánh dấu dòng tương ứng với tổng năng lượng hiện tại.",
                energyBeforeNewEvent: "Năng lượng còn lại trước sự kiện mới",
                noMatchingGroup: "Không thuộc khoảng nào",
                totalLabelBase: "Cơ bản",
                totalLabelExtra: "Thêm",
                totalLabelItems: "Vật phẩm",
                groupDescMatched: (total, group) => `Năng lượng trước sự kiện mới của bạn là <strong>${total}</strong>, dự kiến thuộc nhóm <strong>${group}</strong>.<br>Khoảng tương ứng đã được đánh dấu trong bảng bên dưới.`,
                groupDescNoMatch: (total) => `Tổng năng lượng hiện tại là <strong>${total}</strong>, nhưng không khớp với khoảng nào trong bảng.`,
                footer: (year) => `Copyright © ${year} 大佬群＆Coin999-長長久久`
            }
        };

        let currentLang = localStorage.getItem("calculatorLanguage") || "zh-Hant";

        const groupRows = [
            { rangeLabel: "VIP", min: Infinity, max: Infinity },
            { rangeLabel: "0 - 900", min: 0, max: 900 },
            { rangeLabel: "901 - 4.9K", min: 901, max: 4900 },
            { rangeLabel: "5K - 9.9K", min: 5000, max: 9900 },
            { rangeLabel: "10K - 19.9K", min: 10000, max: 19900 },
            { rangeLabel: "20K - 39.9K", min: 20000, max: 39900 },
            { rangeLabel: "40K - 74.9K", min: 40000, max: 74900 },
            { rangeLabel: "75K - 149K", min: 75000, max: 149000 },
            { rangeLabel: "150K - 299K", min: 150000, max: 299000 },
            { rangeLabel: "300K - 499K", min: 300000, max: 499000 },
            { rangeLabel: "500K - 999K", min: 500000, max: 999000 },
            { rangeLabel: "1M 以上", min: 1000000, max: Infinity }
        ];

        const inputIds = [
            "baseEnergy",
            "extraEnergy",
            "bronzeKey",
            "goldKey",
            "bluePotion",
            "redPotion",
            "bomb",
            "cannon",
            "cookie",
            "caveKey",
            "wealthHammer",
            "mergeLightning",
            "cosmicCoin",
            "shovel",
            "bossCoin",
            "farmCoin",
            "avalancheCoin"
        ];

        const decimalAllowedIds = [
            "bluePotion",
            "redPotion"
        ];

        const integerOnlyIds = inputIds.filter(id => !decimalAllowedIds.includes(id));

        function t(key) {
            return translations[currentLang][key] || translations["zh-Hant"][key] || key;
        }

        function applyI18n() {
            const dictionary = translations[currentLang] || translations["zh-Hant"];

            document.documentElement.lang = currentLang;
            document.title = dictionary.pageTitle;

            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                if (dictionary[key]) {
                    el.textContent = dictionary[key];
                }
            });

            document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
                const key = el.getAttribute("data-i18n-placeholder");
                if (dictionary[key]) {
                    el.setAttribute("placeholder", dictionary[key]);
                }
            });

            setFooterYear();
            calculateAll();
        }

        function sanitizeInputValue(value, allowDecimal = false) {
            if (value === null || value === undefined) return "";

            let text = String(value)
                .replace(/,/g, "")
                .replace(/，/g, "")
                .replace(/\s/g, "")
                .toUpperCase();

            text = text.replace(/[^0-9.KM萬]/g, "");

            const hasK = text.includes("K");
            const hasM = text.includes("M");
            const hasWan = text.includes("萬");

            let suffix = "";

            if (hasK) suffix = "K";
            else if (hasM) suffix = "M";
            else if (hasWan) suffix = "萬";

            text = text.replace(/[KM萬]/g, "");

            if (allowDecimal) {
                const parts = text.split(".");
                const integerPart = parts[0] || "";
                const decimalPart = parts.length > 1 ? parts.slice(1).join("") : "";

                text = integerPart;

                if (parts.length > 1) {
                    text += "." + decimalPart;
                }
            } else {
                text = text.replace(/\./g, "");
            }

            if (text === "." || text === "") {
                return "";
            }

            return text + suffix;
        }

        function parseNumber(value, allowDecimal = false) {
            if (value === null || value === undefined) return 0;

            let text = sanitizeInputValue(value, allowDecimal).toLowerCase();

            if (!text) return 0;

            let multiplier = 1;

            if (text.endsWith("k")) {
                multiplier = 1000;
                text = text.slice(0, -1);
            } else if (text.endsWith("m")) {
                multiplier = 1000000;
                text = text.slice(0, -1);
            } else if (text.endsWith("萬")) {
                multiplier = 10000;
                text = text.slice(0, -1);
            }

            let number = allowDecimal ? parseFloat(text) : parseInt(text, 10);

            if (isNaN(number)) return 0;

            if (!allowDecimal) {
                number = Math.floor(number);
            }

            return number * multiplier;
        }

        function getInputNumber(id) {
            const input = document.getElementById(id);

            if (!input) {
                console.error(`Input not found: ${id}`);
                return 0;
            }

            const allowDecimal = decimalAllowedIds.includes(id);
            return parseNumber(input.value, allowDecimal);
        }

        function formatNumber(num) {
            if (!isFinite(num)) return "∞";

            const value = Math.floor(num);

            const localeMap = {
                "zh-Hant": "zh-TW",
                en: "en-US",
                vi: "vi-VN"
            };

            return value.toLocaleString(localeMap[currentLang] || "zh-TW");
        }

        function getRoundedEnergy(value) {
            return Math.floor(value);
        }

        function calculateItemEnergy() {
            const bronzeKey = getInputNumber("bronzeKey");
            const goldKey = getInputNumber("goldKey");
            const bluePotion = getInputNumber("bluePotion");
            const redPotion = getInputNumber("redPotion");
            const bomb = getInputNumber("bomb");
            const cannon = getInputNumber("cannon");

            const cookie = getInputNumber("cookie");
            const caveKey = getInputNumber("caveKey");
            const wealthHammer = getInputNumber("wealthHammer");
            const mergeLightning = getInputNumber("mergeLightning");
            const cosmicCoin = getInputNumber("cosmicCoin");
            const shovel = getInputNumber("shovel");
            const bossCoin = getInputNumber("bossCoin");
            const farmCoin = getInputNumber("farmCoin");
            const avalancheCoin = getInputNumber("avalancheCoin");

            const magicKingdomEnergy =
                bronzeKey * 105 +
                goldKey * 220 +
                bluePotion / 500 +
                redPotion / 50000 +
                bomb * 50 +
                cannon * 100;

            const normalEventEnergy =
                cookie * 5 +
                caveKey * 10 +
                wealthHammer * 10 +
                mergeLightning * 10 +
                cosmicCoin * 10 +
                shovel * 10 +
                bossCoin / 100 +
                farmCoin / 100 +
                avalancheCoin / 20;

            return {
                magicKingdomEnergy,
                normalEventEnergy,
                totalItemEnergy: magicKingdomEnergy + normalEventEnergy
            };
        }

        function findGroup(totalEnergy) {
            for (const row of groupRows) {
                if (row.rangeLabel === "VIP") continue;

                if (totalEnergy >= row.min && totalEnergy <= row.max) {
                    return row;
                }
            }

            if (totalEnergy > 999000) {
                return groupRows.find(row => row.rangeLabel === "1M 以上");
            }

            return null;
        }

        function calculateAll() {
            const baseEnergy = getInputNumber("baseEnergy");
            const extraEnergy = getInputNumber("extraEnergy");

            const itemData = calculateItemEnergy();

            const rawTotal = baseEnergy + extraEnergy + itemData.totalItemEnergy;
            const totalEnergy = getRoundedEnergy(rawTotal);

            const group = findGroup(totalEnergy);

            document.getElementById("totalEnergyText").textContent = formatNumber(totalEnergy);
            document.getElementById("itemEnergyText").textContent = formatNumber(getRoundedEnergy(itemData.totalItemEnergy));
            document.getElementById("baseExtraText").textContent = formatNumber(getRoundedEnergy(baseEnergy + extraEnergy));

            document.getElementById("totalEnergyDetail").textContent =
                `${t("totalLabelBase")} ${formatNumber(baseEnergy)} + ` +
                `${t("totalLabelExtra")} ${formatNumber(extraEnergy)} + ` +
                `${t("totalLabelItems")} ${formatNumber(getRoundedEnergy(itemData.totalItemEnergy))}`;

            if (group) {
                document.getElementById("nextGroupText").textContent = group.rangeLabel;
                document.getElementById("groupDesc").innerHTML =
                    t("groupDescMatched")(formatNumber(totalEnergy), group.rangeLabel);
            } else {
                document.getElementById("nextGroupText").textContent = t("noMatchingGroup");
                document.getElementById("groupDesc").innerHTML =
                    t("groupDescNoMatch")(formatNumber(totalEnergy));
            }

            renderGroupTable(group ? group.rangeLabel : null);
        }

        function renderGroupTable(activeRangeLabel = null) {
            const tbody = document.getElementById("groupTableBody");
            tbody.innerHTML = "";

            groupRows.forEach(row => {
                const tr = document.createElement("tr");

                if (activeRangeLabel && row.rangeLabel === activeRangeLabel) {
                    tr.classList.add("active-row");
                }

                tr.innerHTML = `<td>${row.rangeLabel}</td>`;

                tbody.appendChild(tr);
            });
        }

        function bindInputSanitizer() {
            integerOnlyIds.forEach(id => {
                const input = document.getElementById(id);

                if (!input) {
                    console.error(`Binding failed. Input not found: ${id}`);
                    return;
                }

                input.addEventListener("input", () => {
                    const cleanValue = sanitizeInputValue(input.value, false);

                    if (input.value !== cleanValue) {
                        input.value = cleanValue;
                    }

                    calculateAll();
                });

                input.addEventListener("blur", () => {
                    input.value = sanitizeInputValue(input.value, false);
                    calculateAll();
                });
            });

            decimalAllowedIds.forEach(id => {
                const input = document.getElementById(id);

                if (!input) {
                    console.error(`Binding failed. Input not found: ${id}`);
                    return;
                }

                input.addEventListener("input", () => {
                    const cleanValue = sanitizeInputValue(input.value, true);

                    if (input.value !== cleanValue) {
                        input.value = cleanValue;
                    }

                    calculateAll();
                });

                input.addEventListener("blur", () => {
                    input.value = sanitizeInputValue(input.value, true);
                    calculateAll();
                });
            });
        }

        function setFooterYear() {
            const year = new Date().getFullYear();
            document.getElementById("footerText").textContent = t("footer")(year);
        }

        function bindLanguageSwitcher() {
            const languageSelect = document.getElementById("languageSelect");

            languageSelect.value = currentLang;

            languageSelect.addEventListener("change", () => {
                currentLang = languageSelect.value;
                localStorage.setItem("calculatorLanguage", currentLang);
                applyI18n();
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            bindLanguageSwitcher();
            renderGroupTable();
            bindInputSanitizer();
            applyI18n();
        });
